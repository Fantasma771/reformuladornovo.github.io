<!DOCTYPE html>
<html lang="pt-BR">
<head><base href="https://d16ilfvy4mv02r.cloudfront.net/workspaces/lHczcJdWK2BJRyD0bz9taDejcR1T8WIA/f19a50e1-2f10-4acc-b4d3-c3acfe748f89/files/">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Equipe Fantasma</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Tahoma,sans-serif;background:#eef0f8;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .box{background:#fff;border-radius:14px;box-shadow:0 3px 14px rgba(0,0,0,0.09);padding:32px;width:100%;max-width:360px;}
  h1{font-size:1.3rem;color:#3a3aff;margin-bottom:4px;text-align:center;}
  p.sub{text-align:center;color:#888;font-size:0.82rem;margin-bottom:24px;}
  label{display:block;font-size:0.74rem;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
  input{width:100%;border:1.5px solid #dde1f0;border-radius:8px;padding:10px 12px;font-size:0.9rem;color:#1a1a2e;background:#f7f8ff;outline:none;margin-bottom:16px;}
  input:focus{border-color:#3a3aff;}
  button{width:100%;background:#3a3aff;color:#fff;border:none;border-radius:8px;padding:11px;font-size:0.9rem;font-weight:700;cursor:pointer;}
  button:hover{background:#2a2adf;}
  #err{color:#c0392b;font-size:0.8rem;margin-bottom:12px;display:none;text-align:center;}
</style>
</head>
<body>
  <div class="box">
    <h1>⚖️ Equipe Fantasma</h1>
    <p class="sub">Acesso restrito</p>
    <div id="err"></div>
    <form id="loginForm">
      <label>Usuário</label>
      <input type="text" id="username" autocomplete="username" required/>
      <label>Senha</label>
      <input type="password" id="password" autocomplete="current-password" required/>
      <button type="submit">Entrar</button>
    </form>
  </div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errBox = document.getElementById('err');
  errBox.style.display = 'none';
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) {
      errBox.textContent = data.error || 'Falha no login';
      errBox.style.display = 'block';
      return;
    }
    window.location.href = data.role === 'admin' ? '/app.html' : '/app.html';
  } catch (err) {
    errBox.textContent = 'Erro de conexão com o servidor.';
    errBox.style.display = 'block';
  }
});
</script>
</body>
</html>
